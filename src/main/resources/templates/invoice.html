<html>

<head lang="en" xmlns:th="http://www.thymeleaf.org">
    <title>Invoice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 75px;
        }

        #garage-info {
            /* border: 1px solid #ccc; */
            padding: 10px;
            margin-bottom: 20px;
            display: grid;
            justify-items: end;
            align-items: center;
            max-width: 60%;
            margin-left: auto;
        }

        #garage-info * {
            font-size: 20px;
            text-align: right;
            margin: 0;
        }

        .customer-info {
            margin-bottom: 20px;
            display: grid;
            justify-content: start;
            align-items: center;
        }

        .customer-invoice-details {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        th {
            background-color: #f2f2f2;
            text-align: center;
        }

        td {
            text-align: center;
        }
    </style>

</head>

<body>
    <center>
        <h1>Invoice</h1>
    </center>
    <div id="garage-info">
        <div class="garage-name">
            <strong>
                <span th:text="${invoice.garage.name}"></span>
            </strong>
        </div>
        <div id="garage-GST">
            <strong>
                GST Number:
            </strong> <span th:text="${invoice.garage.GSTNumber}"></span>
        </div>
        <div class="garage-email">
            <strong>
                Email:
            </strong>
            <span th:text="${invoice.garage.email}"></span>
        </div>
        <div class="garage-phone">
            <strong>
                Phone:
            </strong>
            <span th:text="${invoice.garage.phoneNumber}"></span>
        </div>
    </div>
    <hr>

    <div class="customer-invoice-details">
        <div id="customer-info" class="customer-info">
            <h3>Bill to:</h3>
            <div>
                <strong>Name:</strong> <span th:text="${invoice.owner.name}"></span>
            </div>
            <div>
                <strong>Phone:</strong> <span th:text="${invoice.owner.phoneNumber}"></span>
            </div>
            <div>
                <strong>Email:</strong> <span th:text="${invoice.owner.email}"></span>
            </div>
        </div>

        <div id="invoice-details" class="customer-info">
            <h3>Invoice Details:</h3>
            <div>
                <strong>Invoice Number:</strong> <span th:text="${invoice.invoiceNumber}"></span>
            </div>
            <div>
                <strong>Date:</strong> <span th:text="${invoice.createdAt}"></span>
            </div>

        </div>
    </div>
    <hr>

    <div class="invoice-items">
        <h3>Invoice Items:</h3>
        <table cellpadding="5" cellspacing="0" width="100%">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${invoice.invoiceItems}">
                    <td th:text="${item.part?.partName}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.pricePerUnit}"></td>
                    <td th:text="${item.totalPrice}"></td>
                </tr>

            </tbody>
        </table>

        <div style="text-align: right; margin-top: 20px;">
            <strong>Total Amount Due: <span th:text="${invoice.totalAmount}"></span></strong>
        </div>
    </div>

    <div class="vehicle details">
        <div class="vehicle-number">
            <strong>Vehicle Number:</strong> <span th:text="${invoice.vehicle?.vehicleNumber}"></span>
        </div>
    </div>
    <hr>
    <div class="footer">
        <p>Thank you for your business!</p>
        <p>Please contact us with any questions or concerns.</p>
        <p style="text-align: right; margin-left: 80%;">
            page 1 of 1
        </p>
    </div>
</body>

</html>
