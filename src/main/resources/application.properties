spring.config.import=optional:file:.env[.properties]
spring.application.name=GarageBook

#Security 
security.jwt.secret-key=${SECRET_KEY}
security.jwt.expiration-time=2592000000
 
#mysql
# Database Connection Details
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

#jpa
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#session
spring.session.jdbc.initialize-schema=always

#server
server.port=8080

#Meta
whatsapp.access-token=${WHATSAPP_API_ACCESS_TOKEN}
whatsapp.phone-number-id=${WHATSAPP_API_PHONE_NUMBER_ID}
whatsapp.graph-api-version=${WHATSAPP_API_GRAPH_API_VERSION}

#Frontend
frontend.url=${FRONTEND_URL}